apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-conversation-studio-pvc
  namespace: ai-conversation-studio
  labels:
    app: ai-conversation-studio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: gp3  # AWS EBS gp3 volume — adjust if your cluster uses a different default

